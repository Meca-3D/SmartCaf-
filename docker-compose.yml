version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smartcaf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smartcafé
      MYSQL_USER: leo
      MYSQL_PASSWORD: leo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./admin/backend/smartcafé.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./admin/backend
      dockerfile: Dockerfile
    container_name: smartcaf-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/smartcaf%C3%A9?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: leo
      SPRING_DATASOURCE_PASSWORD: leo
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./admin/frontend
      dockerfile: Dockerfile
    container_name: smartcaf-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8081
    ports:
      - "3000:3000"

volumes:
  mysql-data:
